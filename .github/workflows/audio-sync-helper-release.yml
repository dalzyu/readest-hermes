name: Audio Sync Helper Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag (for example v1.2.3)
        required: true
  release:
    types: [published]

jobs:
  build-helper:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
            pyinstaller_binary: dist/audio-sync-helper-windows-x86_64.exe
            output_name: audio-sync-helper-windows-x86_64.exe
            data_sep: ';'
          - os: macos-latest
            platform: macos-aarch64
            pyinstaller_binary: dist/audio-sync-helper-macos-aarch64
            output_name: audio-sync-helper-macos-aarch64
            data_sep: ':'
          - os: macos-13
            platform: macos-x86_64
            pyinstaller_binary: dist/audio-sync-helper-macos-x86_64
            output_name: audio-sync-helper-macos-x86_64
            data_sep: ':'
          - os: ubuntu-22.04
            platform: linux-x86_64
            pyinstaller_binary: dist/audio-sync-helper-linux-x86_64
            output_name: audio-sync-helper-linux-x86_64
            data_sep: ':'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install helper build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/readest-app/src-tauri/audio_sync_helper/requirements.txt
          python -m pip install pyinstaller

      - name: Install minisign
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y minisign
              ;;
            macOS)
              brew install minisign
              ;;
            Windows)
              choco install minisign -y
              ;;
          esac

      - name: Download NLTK punkt_tab
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/nltk_data"
          python -m nltk.downloader -d "$RUNNER_TEMP/nltk_data" punkt_tab

      - name: Build helper binary with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --onefile \
            --name "audio-sync-helper-${{ matrix.platform }}" \
            --add-data "$RUNNER_TEMP/nltk_data${{ matrix.data_sep }}nltk_data" \
            apps/readest-app/src-tauri/audio_sync_helper/whisperx_word_align.py

      - name: Prepare helper artifact
        shell: bash
        run: |
          cp "${{ matrix.pyinstaller_binary }}" "${{ matrix.output_name }}"

      - name: Compute SHA-256 + file size
        id: digest
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          artifact = Path("${{ matrix.output_name }}")
          hasher = hashlib.sha256()
          with artifact.open("rb") as f:
              while True:
                  chunk = f.read(1024 * 1024)
                  if not chunk:
                      break
                  hasher.update(chunk)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"sha256={hasher.hexdigest()}\n")
              out.write(f"size={artifact.stat().st_size}\n")
          PY

      - name: Sign helper binary (minisign)
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          key_file="$RUNNER_TEMP/tauri-signing.key"
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$key_file"
          minisign -S -s "$key_file" -m "${{ matrix.output_name }}" -x "${{ matrix.output_name }}.minisig" -P "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

      - name: Build helper manifest
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
          HELPER_SHA256: ${{ steps.digest.outputs.sha256 }}
          HELPER_SIZE: ${{ steps.digest.outputs.size }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          platform = "${{ matrix.platform }}"
          helper_name = "${{ matrix.output_name }}"
          manifest_name = f"audio-sync-helper-manifest-{platform}.json"
          helper_url = f"https://github.com/${{ github.repository }}/releases/download/{tag}/{helper_name}"

          manifest = {
              "helperRuntimeVersion": "1",
              "platform": platform,
              "helperUrl": helper_url,
              "helperSize": int(os.environ["HELPER_SIZE"]),
              "helperSha256": os.environ["HELPER_SHA256"],
              "helperSignatureUrl": f"{helper_url}.minisig",
          }

          Path(manifest_name).write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload helper artifacts to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "${{ matrix.output_name }}" \
            "${{ matrix.output_name }}.minisig" \
            "audio-sync-helper-manifest-${{ matrix.platform }}.json" \
            --clobber
